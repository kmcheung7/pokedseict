                </div>
              </div>

              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">2. 文本檔案格式比較</div>
                <div class="text-slate-700 text-sm leading-relaxed space-y-2">
                  <p><b>TXT</b>：純文本、不含任何格式，適合快速讀寫、程序代碼，無壓縮，檔案極小。</p>
                  <p><b>DOCX</b>：格式化文本，支援豐富字體樣式、超連結、多媒體元素，無損壓縮，小到中等。</p>
                  <p><b>ODT</b>：開放格式文書處理器文件，適合日常辦公文書處理。</p>
                  <p><b>PDF</b>：可保留文本格式，適合正式文件傳閱、合同、電子書、可攜式文件存儲。</p>
                </div>
              </div>

              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">3. 自動化功能（格式化文本）</div>
                <div class="text-slate-700 text-sm leading-relaxed space-y-2">
                  <p><b>自動較正</b>：自動偵測並修正輸入錯誤，如拼字錯誤。</p>
                  <p><b>目錄功能</b>：方便快速跳到文件章節。</p>
                  <p><b>郵件合併</b>：減少重複的人手輸入，提升辦公效率。</p>
                </div>
              </div>

              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">4. 圖像</div>
                <div class="text-slate-700 text-sm leading-relaxed space-y-2">
                  <p>圖像分為兩種：<b>點陣圖像</b> 和 <b>向量圖像</b>。</p>
                  <p>點陣圖由像素構成，放大後容易失真；向量圖由數學公式構成，放大後不會失真。</p>
                  <p>常見點陣圖格式：<b>.bmp</b>、<b>.raw</b>、<b>.jpg</b>、<b>.jpeg</b>、<b>.png</b>、<b>.gif</b>、<b>.heic</b>、<b>.webp</b></p>
                  <p>常見向量圖格式：<b>.ai</b>、<b>.svg</b></p>
                </div>
              </div>

              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">5. 音訊與視像</div>
                <div class="text-slate-700 text-sm leading-relaxed space-y-2">
                  <p><b>WAV</b>：無壓縮，音質最高，檔案非常大。</p>
                  <p><b>MP3</b>：有損壓縮，最常見音樂格式，檔案較小。</p>
                  <p><b>AVI</b>：無壓縮或輕微壓縮，檔案極大。</p>
                  <p><b>MP4</b>：有損壓縮，常用於串流媒體平台，跨平台性高。</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function startConcepts() {
      state.quizType = 'concept';
      state.currentQuestion = 0;
      state.score = 0;
      state.answered = false;
      state.selectedAnswer = null;
      state.view = 'quiz';
      render();
    }

    function startQuiz() {
      state.quizType = 'dse';
      state.currentQuestion = 0;
      state.score = 0;
      state.answered = false;
      state.selectedAnswer = null;
      state.view = 'quiz';
      render();
    }

    function renderQuiz() {
      const quizData = getCurrentQuizData();
      const q = quizData[state.currentQuestion];
      const pokeImg = pokeImages[state.currentQuestion % pokeImages.length];

      app.innerHTML = `
        <div class="flex flex-col flex-grow bg-slate-50 overflow-y-auto">
          <div class="bg-blue-600 p-3 text-white flex justify-between items-center shadow-sm">
            <span class="font-pixel text-[8px]">${state.quizType === 'concept' ? 'Concept Question' : 'DSE MC Question'}</span>
            <span class="font-bold bg-blue-700 px-2 py-0.5 rounded-full text-xs">Lv. ${state.currentQuestion + 1}</span>
          </div>

          <div class="p-4 flex-grow flex flex-col items-center">
            <img src="${pokeImg}" class="w-20 h-20 mt-6 mb-3 animate-bounce" alt="Pokemon">

            <div class="bg-white p-4 rounded-xl border border-slate-200 w-full mb-4 shadow-sm h-[150px] flex flex-col justify-center">
              <p class="text-[9px] text-blue-500 font-bold mb-1 uppercase tracking-wider">${q.source}</p>
              <p class="text-sm font-bold text-slate-800 leading-snug whitespace-pre-line">${q.question}</p>
            </div>

            <div class="grid grid-cols-1 gap-2 w-full">
              ${q.options.map(opt => `
                <button
                  onclick="handleAnswer('${opt.id}')"
                  class="option-btn w-full text-left p-3 rounded-lg border-2 border-slate-200 bg-white hover:border-blue-400 hover:bg-blue-50 text-sm min-h-14 flex items-center
                  ${state.answered ? 'disabled' : ''}
                  ${state.answered && opt.id === q.correct ? 'correct' : ''}
                  ${state.answered && opt.id === state.selectedAnswer && opt.id !== q.correct ? 'wrong' : ''}
                ">
                  <span class="font-bold text-blue-600 mr-1">${opt.id}.</span>
                  <span class="leading-tight">${opt.text}</span>
                </button>
              `).join('')}
            </div>
          </div>

          <div class="p-3 border-t bg-white flex justify-end">
            ${state.answered ? `
              <button onclick="nextQuestion()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md text-sm">
                下一題 →
              </button>
            ` : ``}
          </div>
        </div>
      `;
    }

    function renderResult() {
      const quizData = getCurrentQuizData();
      const percentage = (state.score / quizData.length) * 100;

      let msg = percentage >= 80 ? "太強了！你係檔案類型高手！"
              : percentage >= 60 ? "做得好！再接再厲！"
              : "再接再厲！";

      let img = percentage >= 80 ? POKEMON_IMAGES.GREAT
              : percentage >= 60 ? POKEMON_IMAGES.GOOD
              : POKEMON_IMAGES.BAD;

      app.innerHTML = `
        <div class="flex flex-col items-center justify-center flex-grow p-6 text-center bg-gradient-to-b from-yellow-50 to-white">
          <img src="${img}" class="w-32 h-32 mb-4 drop-shadow-xl" alt="Result">
          <h2 class="text-xl font-bold text-slate-800 mb-1">測驗完成！</h2>

          <div class="text-4xl font-pixel text-blue-600 mb-2">
            ${state.score} <span class="text-xl text-slate-400">/ ${quizData.length}</span>
          </div>

          <p class="text-sm text-slate-600 mb-6">${msg}</p>

          <div class="flex gap-3 flex-wrap justify-center">
            <button onclick="changeView('menu')" class="px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">
              返回圖鑑
            </button>
            <button onclick="startConcepts()" class="px-4 py-3 bg-yellow-400 text-blue-900 rounded-xl font-bold hover:bg-yellow-500 shadow-lg transition-all">
              開始捕捉概念！
            </button>
            <button onclick="startQuiz()" class="px-4 py-3 bg-white text-blue-900 rounded-xl font-bold hover:bg-slate-100 shadow-lg transition-all">
              開始捕捉題目！
            </button>
          </div>
        </div>
      `;
    }

    function changeView(view) { state.view = view; render(); }

    function handleAnswer(id) {
      if (state.answered) return;
      const quizData = getCurrentQuizData();
      state.answered = true;
      state.selectedAnswer = id;
      if (id === quizData[state.currentQuestion].correct) state.score++;
      render();
    }

    function nextQuestion() {
      const quizData = getCurrentQuizData();
      if (state.currentQuestion + 1 < quizData.length) {
        state.currentQuestion++;
        state.answered = false;
        state.selectedAnswer = null;
        render();
      } else {
        state.view = 'result';
        render();
      }
    }

    render();
  </script>
</body>
</html>
