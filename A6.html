<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>單位換算 - 數據控制訓練營</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    .font-pixel { font-family: 'Press Start 2P', cursive; }
    .option-btn { transition: all 0.2s ease; }
    .correct { background-color: #4ade80 !important; border-color: #166534 !important; color: white !important; }
    .wrong { background-color: #f87171 !important; border-color: #991b1b !important; color: white !important; }
    .disabled { pointer-events: none; }
    .poke-shadow { box-shadow: 0 4px 0 #b45309; }
  </style>
</head>

<body class="bg-yellow-100 min-h-screen flex items-center justify-center p-2">
  <div id="app" class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col border-[8px] border-yellow-400 max-h-[100vh]"></div>

  <script>
    const quizData = [
      {
        id: 1,
        source: "DSE 2019 1A Q9",
        question: "職員證 RFID 的儲存容量為 2KB，個人資料佔 200B，每筆出入記錄佔 40B。可儲存多少筆記錄？",
        options: [
          { id: 'A', text: "42 筆" },
          { id: 'B', text: "46 筆" },
          { id: 'C', text: "50 筆" },
          { id: 'D', text: "52 筆" }
        ],
        correct: 'B'
      },
      {
        id: 2,
        source: "DSE 2016 1A Q2",
        question: "「HKDSE5」需要多少位元來儲存？",
        options: [
          { id: 'A', text: "24 位元" },
          { id: 'B', text: "32 位元" },
          { id: 'C', text: "48 位元" },
          { id: 'D', text: "64 位元" }
        ],
        correct: 'C'
      },
      {
        id: 3,
        source: "DSE 2024 1B Q2.b(i)",
        question: "估算在 LAN 中接收一個 5GB 視像檔的所需時間，如果網卡速度是 1Gbps。",
        options: [
          { id: 'A', text: "約 4.3 秒" },
          { id: 'B', text: "約 42.9 秒" },
          { id: 'C', text: "約 71.5 秒" },
          { id: 'D', text: "約 429 秒" }
        ],
        correct: 'B'
      },
      {
        id: 4,
        source: "DSE 2018 1B Q3",
        question: "所需時間 =（儲存空間 / 視像檔案大小）/ 60。若儲存空間為 60GB，檔案大小為 11MB，答案約是多少小時？",
        options: [
          { id: 'A', text: "約 9.3 小時" },
          { id: 'B', text: "約 19.3 小時" },
          { id: 'C', text: "約 93.1 小時" },
          { id: 'D', text: "約 931 小時" }
        ],
        correct: 'C'
      },
      {
        id: 5,
        source: "DSE 2020 1B Q3.a(ii)",
        question: "一天拍攝 24 小時，每小時 60 分鐘，每分鐘 10MB。所需儲存空間約是多少？",
        options: [
          { id: 'A', text: "1.40625GB" },
          { id: 'B', text: "14.0625GB" },
          { id: 'C', text: "140.625GB" },
          { id: 'D', text: "24.6GB" }
        ],
        correct: 'B'
      },
      {
        id: 6,
        source: "DSE 2025 1B Q3.a",
        question: "每張相片 5MB，上載頻寬 100Mbps，上載 200 張相片的最短時間約是多少？",
        options: [
          { id: 'A', text: "約 8.39 秒" },
          { id: 'B', text: "約 83.89 秒" },
          { id: 'C', text: "約 838.9 秒" },
          { id: 'D', text: "約 16.78 秒" }
        ],
        correct: 'B'
      },
      {
        id: 7,
        source: "DSE 2023 1B Q5.b(ii)",
        question: "每個檔案大小 2KB，200 人同時傳送，網絡頻寬 10Mbps，所需時間約是多少？",
        options: [
          { id: 'A', text: "約 0.33 秒" },
          { id: 'B', text: "約 3.28 秒" },
          { id: 'C', text: "約 32.8 秒" },
          { id: 'D', text: "約 0.03 秒" }
        ],
        correct: 'A'
      },
      {
        id: 8,
        source: "單位換算基礎概念",
        question: "下列哪一項是正確的單位換算？",
        options: [
          { id: 'A', text: "1KB = 1000B" },
          { id: 'B', text: "1MB = 1000KB" },
          { id: 'C', text: "1GB = 1024MB" },
          { id: 'D', text: "1B = 8KB" }
        ],
        correct: 'C'
      }
    ];

    const app = document.getElementById('app');

    const POKEMON_IMAGES = {
      MENU: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png",
      BAD: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png",
      GOOD: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png",
      GREAT: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png",
    };

    const pokeImages = [
      "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png",
      "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png",
      "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png",
      "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png",
      "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png",
      "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png",
    ];

    let state = {
      view: 'menu',
      currentQuestion: 0,
      score: 0,
      answered: false,
      selectedAnswer: null
    };

    function render() {
      if (state.view === 'menu') renderMenu();
      else if (state.view === 'quiz') renderQuiz();
      else if (state.view === 'result') renderResult();
    }

    function renderMenu() {
      app.innerHTML = `
        <div class="flex flex-col flex-grow bg-blue-600 overflow-y-auto">
          <div class="flex flex-col items-center justify-center p-6 text-center">
            <img src="${POKEMON_IMAGES.MENU}" class="w-24 h-24 drop-shadow-2xl" alt="MENU">
            <h1 class="text-xl font-pixel text-white mt-3 drop-shadow-md">POKÉDEX</h1>
            <h2 class="text-yellow-300 font-bold text-md mt-1 tracking-widest">單位換算溫習圖鑑 / Q&amp;A</h2>

            <button onclick="startQuiz()" class="mt-4 w-full max-w-[280px] py-3 bg-yellow-400 text-blue-900 font-bold text-md rounded-2xl poke-shadow hover:scale-105 transition-all active:scale-95">
              開始捕捉題目！
            </button>
          </div>

          <div class="flex-grow bg-blue-50 rounded-t-3xl p-4 shadow-inner">
            <h3 class="text-xs font-bold text-slate-600 uppercase tracking-widest mb-4 flex items-center gap-2">
              <span class="w-2 h-2 bg-blue-400 rounded-full"></span> 溫習圖鑑
            </h3>

            <div class="space-y-4">
              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">1. 常見單位</div>
                <div class="text-slate-700 text-sm leading-relaxed">
                  <ul class="space-y-2">
                    <li class="flex gap-2 items-start">
                      <span class="font-bold text-blue-600">•</span>
                      <span>電腦中常見的單位有 <b>b</b>、<b>B</b>、<b>KB</b>、<b>MB</b>、<b>GB</b>、<b>TB</b>。</span>
                    </li>
                    <li class="flex gap-2 items-start">
                      <span class="font-bold text-blue-600">•</span>
                      <span>單位用來表示儲存空間、檔案大小、記憶體容量、快取大小等。</span>
                    </li>
                    <li class="flex gap-2 items-start">
                      <span class="font-bold text-blue-600">•</span>
                      <span>數據傳輸速率則以 <b>bps</b>、<b>kbps</b>、<b>Mbps</b>、<b>Gbps</b> 表示。</span>
                    </li>
                  </ul>
                </div>
              </div>

              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">2. 數據容量單位</div>
                <div class="text-slate-700 text-sm leading-relaxed space-y-2">
                  <div><b>1 B = 8 b</b></div>
                  <div><b>1 KB = 1024 B</b></div>
                  <div><b>1 MB = 1024 KB</b></div>
                  <div><b>1 GB = 1024 MB</b></div>
                  <div><b>1 TB = 1024 GB</b></div>
                  <div class="text-slate-500 text-xs mt-2">換算時要先化成相同單位，再計算。</div>
                </div>
              </div>

              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">3. 數據傳輸速率的單位</div>
                <div class="text-slate-700 text-sm leading-relaxed space-y-3">
                  <div class="font-bold text-slate-800">Gbps → Mbps → Kbps → bps</div>
                  <div class="flex items-center gap-2 flex-wrap text-base font-bold">
                    <span>Gbps</span><span>→</span>
                    <span class="text-red-600">=1000</span>
                    <span>Mbps</span><span>→</span>
                    <span class="text-red-600">=1000</span>
                    <span>Kbps</span><span>→</span>
                    <span class="text-red-600">=1000</span>
                    <span>bps</span>
                  </div>
                  <div class="text-slate-500 text-xs">
                    每向右一級，乘以 1000；每向左一級，除以 1000。
                  </div>
                </div>
              </div>

              <div class="bg-white rounded-2xl border border-blue-100 p-4 shadow-sm">
                <div class="text-lg font-bold text-blue-600 mb-3">4. 常見計算公式</div>
                <div class="text-slate-700 text-sm leading-relaxed space-y-2">
                  <div><b>所需時間 = 視像檔案大小 / 網卡速度</b></div>
                  <div><b>所需時間 = （儲存空間 / 視像檔案大小） / 60</b>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;[分鐘轉小時]</div>
                  <div><b>所需儲存空間 = （24 × 60 × 10MB） / 1024</b>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;[一天有 24 小時，每小時有 60 分鐘]</div>
                  <div><b>所需時間 = 相片檔案大小 × 數量 / 網絡頻寬</b></div>
                </div>
              </div>
            </div>

          </div>
        </div>
      `;
    }

    function renderQuiz() {
      const q = quizData[state.currentQuestion];
      const pokeImg = pokeImages[state.currentQuestion % pokeImages.length];

      app.innerHTML = `
        <div class="flex flex-col flex-grow bg-slate-50 overflow-y-auto">
          <div class="bg-blue-600 p-3 text-white flex justify-between items-center shadow-sm">
            <span class="font-pixel text-[8px]">Wild Question</span>
            <span class="font-bold bg-blue-700 px-2 py-0.5 rounded-full text-xs">Lv. ${state.currentQuestion + 1}</span>
          </div>

          <div class="p-4 flex-grow flex flex-col items-center">
            <img src="${pokeImg}" class="w-20 h-20 mt-6 mb-3 animate-bounce" alt="Pokemon">

            <div class="bg-white p-4 rounded-xl border border-slate-200 w-full mb-4 shadow-sm h-[140px] flex flex-col justify-center">
              <p class="text-[9px] text-blue-500 font-bold mb-1 uppercase tracking-wider">${q.source}</p>
              <p class="text-sm font-bold text-slate-800 leading-snug whitespace-pre-line">${q.question}</p>
            </div>

            <div class="grid grid-cols-1 gap-2 w-full">
              ${q.options.map(opt => `
                <button
                  onclick="handleAnswer('${opt.id}')"
                  class="option-btn w-full text-left p-3 rounded-lg border-2 border-slate-200 bg-white hover:border-blue-400 hover:bg-blue-50 text-sm h-14 flex items-center
                  ${state.answered ? 'disabled' : ''}
                  ${state.answered && opt.id === q.correct ? 'correct' : ''}
                  ${state.answered && opt.id === state.selectedAnswer && opt.id !== q.correct ? 'wrong' : ''}
                ">
                  <span class="font-bold text-blue-600 mr-1">${opt.id}.</span>
                  <span class="leading-tight">${opt.text}</span>
                </button>
              `).join('')}
            </div>
          </div>

          <div class="p-3 border-t bg-white flex justify-end">
            ${state.answered ? `
              <button onclick="nextQuestion()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md text-sm">
                下一隻 →
              </button>
            ` : ``}
          </div>
        </div>
      `;
    }

    function renderResult() {
      const percentage = (state.score / quizData.length) * 100;

      let msg = percentage >= 80 ? "太強了！你係單位換算高手！"
              : percentage >= 60 ? "做得好！再接再厲！"
              : "再接再厲！";

      let img = percentage >= 80 ? POKEMON_IMAGES.GREAT
              : percentage >= 60 ? POKEMON_IMAGES.GOOD
              : POKEMON_IMAGES.BAD;

      app.innerHTML = `
        <div class="flex flex-col items-center justify-center flex-grow p-6 text-center bg-gradient-to-b from-yellow-50 to-white">
          <img src="${img}" class="w-32 h-32 mb-4 drop-shadow-xl" alt="Result">
          <h2 class="text-xl font-bold text-slate-800 mb-1">測驗完成！</h2>

          <div class="text-4xl font-pixel text-blue-600 mb-2">
            ${state.score} <span class="text-xl text-slate-400">/ ${quizData.length}</span>
          </div>

          <p class="text-sm text-slate-600 mb-6">${msg}</p>

          <div class="flex gap-3">
            <a href="index.html" class="px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">
              返回圖鑑
            </a>
            <button onclick="startQuiz()" class="px-4 py-3 bg-yellow-400 text-blue-900 rounded-xl font-bold hover:bg-yellow-500 shadow-lg transition-all">
              再試一次
            </button>
          </div>
        </div>
      `;
    }

    function changeView(view) { state.view = view; render(); }

    function startQuiz() {
      state.currentQuestion = 0;
      state.score = 0;
      state.answered = false;
      state.selectedAnswer = null;
      state.view = 'quiz';
      render();
    }

    function handleAnswer(id) {
      if (state.answered) return;
      state.answered = true;
      state.selectedAnswer = id;
      if (id === quizData[state.currentQuestion].correct) state.score++;
      render();
    }

    function nextQuestion() {
      if (state.currentQuestion + 1 < quizData.length) {
        state.currentQuestion++;
        state.answered = false;
        state.selectedAnswer = null;
        render();
      } else {
        state.view = 'result';
        render();
      }
    }

    render();
  </script>
</body>
</html>
